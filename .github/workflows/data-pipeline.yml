name: Daily data pipeline

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run forecast pipeline
        working-directory: data-prep
        run: uv run 02_forecast.py

      - name: Run anomaly pipeline
        working-directory: data-prep
        run: uv run 03_compare.py

      - name: Upload anomaly.zarr to S3
        run: aws s3 sync data/anomaly.zarr/ s3://weather-anomaly-zarr/anomaly.zarr/ --delete
